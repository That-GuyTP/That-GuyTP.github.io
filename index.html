<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Maintenance notice for Thomas Peterson's portfolio website."
    />
    <title>Website Temporarily Down</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1a2430;
        background: linear-gradient(135deg, #f6f8fb 0%, #edf1f7 100%);
      }

      .maintenance-card {
        width: min(760px, 100%);
        padding: clamp(1.25rem, 2.5vw, 2.2rem);
        background: #ffffff;
        border: 1px solid #d9e1ee;
        border-left: 6px solid #2563eb;
        border-radius: 14px;
        box-shadow: 0 18px 35px rgba(15, 23, 42, 0.1);
      }

      .maintenance-card h1 {
        margin: 0 0 0.85rem;
        font-size: clamp(1.45rem, 3vw, 2rem);
      }

      .maintenance-card p {
        margin: 0;
        line-height: 1.65;
      }

      .maintenance-card p + p {
        margin-top: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="maintenance-card" role="status" aria-live="polite">
      <h1>Website Temporarily Down</h1>
      <p>
        Sorry, my webpage is currently down due to an issue with Render.com&apos;s
        &quot;free&quot; account tier.
      </p>
      <p>
        I am currently configuring a workaround and plan to have this page back up by
        Monday, March 9, 2026 at 2:00 PM EST.
      </p>
      <p>Thank you for your understanding.</p>
    </main>
  </body>
</html>
